<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 14px; background: #0a0e1a; color: #e2e8f0; font-family: system-ui; margin: 0; }
    h3 { margin: 0 0 8px; color: #63b3ed; }
    .status { background: #111827; padding: 8px; border-radius: 12px; margin: 10px 0; font-size: 12px; }
    button { background: #63b3ed20; border: none; padding: 8px; width: 100%; border-radius: 20px; cursor: pointer; color: #63b3ed; font-weight: bold; margin-top: 8px; }
    button:hover { background: #63b3ed40; }
    .credit { text-align: center; margin-top: 12px; font-size: 9px; color: #555; border-top: 1px solid #334155; padding-top: 8px; }
    .credit a { color: #63b3ed; text-decoration: none; }
  </style>
</head>
<body>
  <h3>📊 Performance Mirror</h3>
  <div class="status" id="status">✅ Active on Codeforces profile pages</div>
  <button id="refresh">↻ Refresh current profile</button>
  <div class="credit">
    🧠 <strong>Viraj Sail</strong> • <a href="https://github.com/VirajSail" target="_blank">GitHub</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
